# Copyright 2026 Query Farm LLC - https://query.farm
#
# IMPORTANT — native dependency.
# This worker needs the libpostal C library + ~2 GB of ML data models. libpostal
# is NOT pip-installable and NOT bundled; the `postal` (pypostal) binding is a C
# extension compiled against it. Building libpostal from source AND downloading
# its data on a CI runner takes several minutes and ~2 GB of disk on every run.
#
# So the jobs are split into tiers:
#   * lint — pure-Python, needs NO libpostal. Always runs, always meaningful.
#   * test / integration — need libpostal compiled + data downloaded; both build
#     it from source first. These are the authoritative behaviour gates but are
#     heavy, so they're gated behind the `RUN_LIBPOSTAL` repo variable.
#
# The SQL end-to-end runs through the real signed `vgi` DuckDB community
# extension via a prebuilt standalone `haybarn-unittest` (see ci/README.md) — no
# C++ build of the *extension*; only the libpostal native lib is built here.
name: CI

on:
  push:
    branches: [main]
    paths-ignore: ['README.md']
  pull_request:
    branches: [main]
    paths-ignore: ['README.md']
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Pure-Python lint: no libpostal needed, so it's fast and always green.
  # ---------------------------------------------------------------------------
  lint:
    name: Lint (pure-Python, no libpostal)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0

      - name: Set up Python 3.13
        run: uv python install 3.13

      - name: Install lint tools
        run: uv tool install ruff && uv tool install mypy

      - name: Check formatting
        run: uvx ruff format --check .

      - name: Check linting
        run: uvx ruff check .

      - name: Type check (mypy)
        run: uvx mypy vgi_libpostal/ || true  # tolerant: type-only, libpostal absent

  # Resolve the latest published haybarn release once (only used by the gated
  # integration job, but cheap and keeps the version un-pinned).
  resolve-haybarn:
    name: Resolve haybarn release
    runs-on: ubuntu-latest
    if: ${{ vars.RUN_LIBPOSTAL == 'true' }}
    outputs:
      release: ${{ steps.r.outputs.release }}
    steps:
      - id: r
        run: |
          REL=$(gh release view --repo Query-farm-haybarn/haybarn --json tagName --jq .tagName)
          echo "release=$REL" >> "$GITHUB_OUTPUT"
          echo "Latest haybarn release: $REL"
        env:
          GH_TOKEN: ${{ github.token }}

  # ---------------------------------------------------------------------------
  # Build libpostal once, then run pytest AND the SQL E2E (standalone haybarn).
  # HEAVY/SLOW: ~minutes to compile + ~2 GB data download — gated behind the
  # `RUN_LIBPOSTAL` repo variable (default off to keep PRs fast). Flip it to
  # 'true' on a runner that can afford the build.
  # ---------------------------------------------------------------------------
  integration:
    name: Tests + E2E SQL (builds libpostal — heavy/slow, ~2 GB)
    runs-on: ubuntu-latest
    needs: resolve-haybarn
    if: ${{ vars.RUN_LIBPOSTAL == 'true' }}
    env:
      LIBPOSTAL_PREFIX: ${{ github.workspace }}/.libpostal
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0

      - name: Set up Python 3.13
        run: uv python install 3.13

      # ~~~ Build libpostal from source (several minutes) ~~~
      - name: Install libpostal build deps
        run: sudo apt-get update && sudo apt-get install -y curl autoconf automake libtool pkg-config

      - name: Build + install libpostal (+ download ~2 GB data)
        run: |
          git clone https://github.com/openvenues/libpostal "$RUNNER_TEMP/libpostal"
          cd "$RUNNER_TEMP/libpostal"
          ./bootstrap.sh
          ./configure --prefix="$LIBPOSTAL_PREFIX" --datadir="$LIBPOSTAL_PREFIX/data"
          make -j"$(nproc)"
          make install
          echo "$LIBPOSTAL_PREFIX/lib" | sudo tee /etc/ld.so.conf.d/libpostal.conf
          sudo ldconfig

      # pypostal compiles against the libpostal we just built.
      - name: Install the worker (compiles pypostal against libpostal)
        env:
          CFLAGS: -I${{ github.workspace }}/.libpostal/include
          LDFLAGS: -L${{ github.workspace }}/.libpostal/lib
          LD_LIBRARY_PATH: ${{ github.workspace }}/.libpostal/lib
        run: uv sync --frozen --extra dev

      - name: Run unit / integration tests
        env:
          LD_LIBRARY_PATH: ${{ github.workspace }}/.libpostal/lib
        run: uv run --no-sync pytest -q

      - name: Download haybarn-unittest
        run: |
          gh release download "$HAYBARN_RELEASE" \
            --repo Query-farm-haybarn/haybarn \
            --pattern 'haybarn_unittest-linux-amd64.zip' \
            --output haybarn-unittest.zip --clobber
          mkdir -p hb && unzip -o -q haybarn-unittest.zip -d hb
        env:
          GH_TOKEN: ${{ github.token }}
          HAYBARN_RELEASE: ${{ needs.resolve-haybarn.outputs.release }}

      - name: Resolve runner + worker paths
        run: |
          # Absolute paths: run-integration.sh cd's into a staging dir before
          # invoking the runner. The worker runs from the compiled .venv via plain
          # `.venv/bin/python` (no uv re-resolve / no pypostal rebuild per ATTACH),
          # with LD_LIBRARY_PATH pointing at the libpostal we built.
          UNITTEST="$PWD/$(find hb -name 'haybarn-unittest' -type f | head -1)"
          chmod +x "$UNITTEST"
          echo "HAYBARN_UNITTEST=$UNITTEST" >> "$GITHUB_ENV"
          echo "VGI_LIBPOSTAL_WORKER=$PWD/.venv/bin/python $PWD/libpostal_worker.py" >> "$GITHUB_ENV"

      - name: Run extension integration suite
        env:
          LD_LIBRARY_PATH: ${{ github.workspace }}/.libpostal/lib
        run: ci/run-integration.sh
