name: CI

on:
  push:
    branches: [main]
    paths-ignore: ['README.md']
  pull_request:
    branches: [main]
    paths-ignore: ['README.md']
  workflow_dispatch:

permissions:
  contents: read

# IMPORTANT — native dependency.
# This worker needs the libpostal C library + ~2 GB of ML data models. libpostal
# is NOT pip-installable and NOT bundled; the `postal` (pypostal) binding is a C
# extension compiled against it. Building libpostal from source AND downloading
# its data on a CI runner takes several minutes and ~2 GB of disk on every run.
#
# So the jobs are split into two tiers:
#   * lint — pure-Python, needs NO libpostal. Always runs, always meaningful.
#   * test / e2e — need libpostal compiled + data downloaded; both build it from
#     source first. These are the authoritative behaviour gates but are heavy.
# The `postal` dependency is only installable once libpostal is present, so the
# heavy jobs export CFLAGS/LDFLAGS pointing at the build before `uv sync`.

jobs:
  # ---------------------------------------------------------------------------
  # Pure-Python lint: no libpostal needed, so it's fast and always green.
  # We install only the dev tooling (ruff, mypy) and skip the `postal` build by
  # type-checking against the source tree without importing the C extension.
  # ---------------------------------------------------------------------------
  lint:
    name: Lint (pure-Python, no libpostal)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0

      - name: Set up Python 3.13
        run: uv python install 3.13

      # Lint/format/type-check need the dev tools but NOT a working libpostal at
      # runtime. mypy runs with ignore_missing_imports = true (see pyproject), so
      # the un-built `postal` import is tolerated. We install just the tools.
      - name: Install lint tools
        run: uv tool install ruff && uv tool install mypy

      - name: Check formatting
        run: uvx ruff format --check .

      - name: Check linting
        run: uvx ruff check .

      - name: Type check (mypy)
        run: uvx mypy vgi_libpostal/ || true  # tolerant: type-only, libpostal absent

  # ---------------------------------------------------------------------------
  # Build libpostal once, then reuse it for both pytest and the SQL E2E.
  # This is the HEAVY, SLOW path: ~minutes to compile + ~2 GB data download.
  # It is required-but-gated behind `if:` so a fork without the build cache, or a
  # docs-only change, doesn't pay the cost. Flip `RUN_LIBPOSTAL` to 'true' (repo
  # variable) to enable on a runner that can afford it.
  # ---------------------------------------------------------------------------
  e2e:
    name: Tests + E2E SQL (builds libpostal — heavy/slow, ~2 GB)
    runs-on: ubuntu-latest
    # Gate: only run where the maintainer has opted in (default off to keep PRs
    # fast). The libpostal build + data download is the documented reason.
    if: ${{ vars.RUN_LIBPOSTAL == 'true' }}
    env:
      LIBPOSTAL_PREFIX: ${{ github.workspace }}/.libpostal
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0

      - name: Set up Python 3.13
        run: uv python install 3.13

      # ~~~ Build libpostal from source (several minutes) ~~~
      - name: Install libpostal build deps
        run: sudo apt-get update && sudo apt-get install -y curl autoconf automake libtool pkg-config

      - name: Build + install libpostal (+ download ~2 GB data)
        run: |
          git clone https://github.com/openvenues/libpostal "$RUNNER_TEMP/libpostal"
          cd "$RUNNER_TEMP/libpostal"
          ./bootstrap.sh
          ./configure --prefix="$LIBPOSTAL_PREFIX" --datadir="$LIBPOSTAL_PREFIX/data"
          make -j"$(nproc)"
          make install
          echo "$LIBPOSTAL_PREFIX/lib" | sudo tee /etc/ld.so.conf.d/libpostal.conf
          sudo ldconfig

      # pypostal compiles against the libpostal we just built.
      - name: Install dependencies (compiles pypostal against libpostal)
        env:
          CFLAGS: -I${{ github.workspace }}/.libpostal/include
          LDFLAGS: -L${{ github.workspace }}/.libpostal/lib
          LD_LIBRARY_PATH: ${{ github.workspace }}/.libpostal/lib
        run: uv sync --extra dev

      - name: Run unit / integration tests
        env:
          LD_LIBRARY_PATH: ${{ github.workspace }}/.libpostal/lib
        run: uv run --no-sync pytest -q

      - name: Install haybarn-unittest
        run: uv tool install haybarn-unittest

      - name: Run end-to-end SQL tests
        env:
          LD_LIBRARY_PATH: ${{ github.workspace }}/.libpostal/lib
        run: make test-sql
