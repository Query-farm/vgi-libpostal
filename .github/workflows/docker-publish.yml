# Copyright 2026 Query Farm LLC - https://query.farm
#
# Build + publish the multi-arch vgi-libpostal image to ghcr.io. The heavy
# lifting (multi-arch build -> per-arch /health boot smoke -> image SQL suite ->
# push-by-digest -> manifest -> cosign-sign) lives in the shared reusable
# workflow Query-farm/vgi-actions/docker-publish.yml; this file gates on the
# repo's own CI and supplies the worker-specific inputs.
#
# The image bakes the libpostal C library + its ~2 GB data models (built from
# source at image-build time), so it is large but fully self-contained.
#
# Tag-driven: vX.Y.Z -> :X.Y.Z / :X.Y / :latest; push to main -> :edge.
name: Publish image to ghcr.io

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docker-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  publish:
    needs: [ci]
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    uses: Query-farm/vgi-actions/.github/workflows/docker-publish.yml@v1
    secrets: inherit
    with:
      image_name: vgi-libpostal
      # `import postal` only opens the native binding (cheap); the ~2 GB models
      # load lazily on the first parse query, so the import smoke stays fast.
      smoke_import: "vgi_libpostal, postal, pyarrow"
      health_port: "8000"
      version_check_cmd: "ci/check-version.sh"
      # Validate the built image's two transports against the signed vgi
      # extension. The worker *logic* over stdio/HTTP/unix is already exercised
      # every run by the gating `ci` job's integration matrix (when RUN_LIBPOSTAL
      # is on), so here we only prove the IMAGE's entrypoints speak the protocol:
      #   - stdio: smoke ONE file (one cold container; loads the model once);
      #   - HTTP : the FULL suite against a SINGLE warm container (end-to-end
      #            image check via the default `http` entrypoint + /health).
      # $CITEST_IMAGE is the loaded <image>:citest-amd64 ref; GH_TOKEN is
      # provided for the haybarn download.
      image_test: |
        echo "::group::download haybarn-unittest"
        REL=$(gh release view --repo Query-farm-haybarn/haybarn --json tagName --jq .tagName)
        gh release download "$REL" --repo Query-farm-haybarn/haybarn \
          --pattern 'haybarn_unittest-linux-amd64.zip' --output hb.zip --clobber
        mkdir -p hb && unzip -o -q hb.zip -d hb
        export HAYBARN_UNITTEST="$PWD/$(find hb -name 'haybarn-unittest' -type f | head -1)"
        chmod +x "$HAYBARN_UNITTEST"
        echo "::endgroup::"

        echo "::group::stdio entrypoint smoke (one file, cold container per ATTACH)"
        TRANSPORT=subprocess \
          TEST_PATTERN="test/sql/expand.test" \
          VGI_LIBPOSTAL_WORKER="docker run -i --rm $CITEST_IMAGE stdio" \
          ci/run-integration.sh
        echo "::endgroup::"

        echo "::group::full SQL suite — HTTP transport (one warm container)"
        CID=$(docker run -d -p 18000:8000 "$CITEST_IMAGE")
        trap 'docker rm -f "$CID" >/dev/null 2>&1 || true' EXIT
        for _ in $(seq 1 60); do curl -fsS -o /dev/null http://localhost:18000/health && break; sleep 1; done
        TRANSPORT=http VGI_LIBPOSTAL_WORKER="http://localhost:18000" ci/run-integration.sh
        echo "::endgroup::"
